name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7

      - name: Build, test, and package
        run: ./scripts/release.sh

      - name: Sign update archive
        env:
          ED25519_PRIVATE_KEY: ${{ secrets.ED25519_PRIVATE_KEY }}
        run: |
          ZIP=$(ls dist/*.zip)
          swift scripts/sign-update.swift sign "$ZIP"
          PUBLIC_KEY=$(sed -n 's/.*publicKeyBase64 = "\([^"]*\)".*/\1/p' \
            FlowerPassword/Shell/SelfUpdater.swift)
          if [ -z "$PUBLIC_KEY" ]; then
            echo "Embedded public key not found in SelfUpdater.swift" >&2
            exit 1
          fi
          swift scripts/sign-update.swift verify "$PUBLIC_KEY" "$ZIP" "$ZIP.sig"

      - name: Upload build artifact (dry run)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v7
        with:
          name: FlowerPassword
          # Deliberately excludes the .sig: dry runs should not leave signed,
          # installable archives in artifact storage.
          path: dist/*.zip

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ZIP=$(ls dist/*.zip)
          VERSION=${ZIP#dist/FlowerPassword-}
          VERSION=${VERSION%.zip}
          if [ "v$VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match app version $VERSION" >&2
            exit 1
          fi
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            assets=$(gh release view "$GITHUB_REF_NAME" --json assets --jq '.assets[].name')
            for asset in "$(basename "$ZIP")" "$(basename "$ZIP").sig"; do
              if ! printf '%s\n' "$assets" | grep -Fqx "$asset"; then
                echo "Release $GITHUB_REF_NAME exists but is missing $asset;" >&2
                echo "a partial publish cannot be repaired by re-running (a rebuilt" >&2
                echo "archive would not match the published one). Delete the release" >&2
                echo "with 'gh release delete $GITHUB_REF_NAME' and re-run." >&2
                exit 1
              fi
            done
            echo "Release $GITHUB_REF_NAME already exists with all assets; skipping creation"
            exit 0
          fi
          {
            echo "Requires macOS 14 or later. Universal binary (Apple Silicon and Intel)."
            echo
            echo "The app is not notarized; see the README for the one-time Gatekeeper steps."
            echo "Existing installs can update in place via \"Check for Updates\" in the menu;"
            echo "the download is verified against the Ed25519 signature in the \`.zip.sig\` asset."
            echo
            echo "## SHA-256"
            echo
            echo '```'
            shasum -a 256 "$ZIP" | sed 's|dist/||'
            echo '```'
          } > notes.md
          gh release create "$GITHUB_REF_NAME" "$ZIP" "$ZIP.sig" --title "$GITHUB_REF_NAME" --notes-file notes.md

      - name: Check out Homebrew tap
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/checkout@v7
        with:
          repository: xlsdg/homebrew-tap
          ssh-key: ${{ secrets.TAP_DEPLOY_KEY }}
          path: tap

      - name: Update Homebrew cask
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -o pipefail
          gh release download "$GITHUB_REF_NAME" --pattern '*.zip' --dir asset
          ZIP=$(ls asset/*.zip)
          VERSION=$(basename "$ZIP" .zip)
          VERSION=${VERSION#FlowerPassword-}
          SHA256=$(shasum -a 256 "$ZIP" | awk '{print $1}')
          CASK=tap/Casks/flower-password.rb
          sed -i '' \
            -e "s/^  version \".*\"$/  version \"$VERSION\"/" \
            -e "s/^  sha256 \".*\"$/  sha256 \"$SHA256\"/" \
            "$CASK"
          grep -q "version \"$VERSION\"" "$CASK"
          grep -q "sha256 \"$SHA256\"" "$CASK"
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/flower-password.rb
          git diff --cached --quiet || git commit -m "chore: bump flower-password to $VERSION"
          git push
